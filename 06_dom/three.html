<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVASCRIPT Revision | DOM</title>
</head>
<body style = "background-color: #212121; color: blueviolet;">
    
</body>
<script>
    const div = document.createElement("div")
    console.log(div);
    div.className = "main"
    // div.id = "myId"
    div.id = Math.round(Math.random() * 10 + 1)
    // for custom attributes
    div.setAttribute("title", "generated title")
    div.style.backgroundColor = "purple"
    div.style.padding = "15px"
    // div.innerText = "DOM Revision"
    const addText = document.createTextNode("DOM Revision")
    div.appendChild(addText)
    // all this will be stored in a memory but not be visible on screen bcz we hvnt attached it yet
    
    document.body.appendChild(div)

</script>
</html>
