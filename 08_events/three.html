<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Javascript Revision | Events</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    // const sayDate = function(){
    //     console.log("Hola NYC", Date.now() );
    // }
    // setInterval(sayDate, 1000);   //This is direct

    const sayDate = function(text){
        console.log(text, Date.now());
    }
    // const intervalId = setInterval(sayDate, 1000, "Hola NYC")   //3 parameters, pass text here
    let intervalId;
    const startIt = document.querySelector("#start").addEventListener('click', function (){
        intervalId = setInterval(sayDate, 1000, "Hola NYC")
    })
    const stopIt = document.querySelector("#stop").addEventListener('click', function(){
        clearInterval(intervalId);
    })
</script>
</html>
