<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>Click</button>
</body>
<script>
    class React{
        constructor(){
            this.library ="react"
            this.server = "https://localhost:3000"

            //requirement
            document
                .querySelector('button')
                .addEventListener('click', this.handleClick.bind(this))
        }
        handleClick(){
            console.log("button clicked")
            // console.log(this);   //will not be able to access class items/methods w/o using bind, refrence is lost
            console.log(this.server)
        }
    }    
    const app = new React()
</script>
</html>
